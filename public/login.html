<body>

    <main class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h2 class="card-title text-center mb-4">Login</h2>
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" required>
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary">Login</button>
                            </div>
                        </form>
                        <div class="text-center mt-3">
                            <a href="/forgot-password">Forgot Password?</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    <!-- arsrates/app/templates/partials/scripts.html -->
<!-- Bootstrap Bundle JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- App Configuration and Authentication -->
<script src="/static/js/config.js"></script>
<script src="/static/js/auth.js"></script>

<!-- Add any other global utility functions after auth.js -->
<script>
// Add any global utility functions that aren't auth-related here
</script>
    
    <script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    try {
        const response = await fetch(`${window.APP_CONFIG.API_URL}/auth/login`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            })
        });

        console.log('Login response status:', response.status);

        if (response.ok) {
            const data = await response.json();
            console.log('Received token:', data.token);
            
            // Exchange token and set cookie
            const exchangeResponse = await fetch(
                `${window.APP_CONFIG.API_URL}/auth/token?token=${data.token}`, 
                { credentials: 'include' }
            );

            if (exchangeResponse.ok) {
                // Set token in localStorage
                AuthManager.setToken(data.token);
                
                // Redirect to homepage
                window.location.href = `${window.APP_CONFIG.API_URL}`;
            } else {
                throw new Error('Token exchange failed');
            }
        } else {
            const errorData = await response.json();
            console.error('Login error:', errorData);
            alert(errorData.detail || 'Login failed. Please check your credentials.');
        }
    } catch (error) {
        console.error('Login error:', error);
        alert('Login failed. Please try again.');
    }
});
</script>
</body>
