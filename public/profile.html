<!DOCTYPE html>
<html lang="en">
    <!-- arsrates/app/templates/profile.html -->
<head>
    <!-- arsrates/app/templates/partials/head.html -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ARS Rates">
<meta name="theme-color" content="#4F46E5">

<!-- Stylesheets -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- PWA/Icons -->
<link rel="manifest" href="/static/manifest.json">
<link rel="apple-touch-icon" href="/static/images/icon-192x192.png">
<link rel="icon" type="image/x-icon" href="/static/images/favicon.ico">
    <title>Profile - ARS Rates Monitor</title>
</head>
<body>
    <!-- arsrates/app/templates/partials/navbar.html -->
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="https://api.arsrates.com">ARS Rates</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarContent">
            <ul class="navbar-nav mx-auto">
                <li class="nav-item">
                    <a class="nav-link" href="https://api.arsrates.com/guide">Quick Guide</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="https://api.arsrates.com/wu-guide">WU Guide</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="https://api.arsrates.com/wu-locations">Find WU Location</a>
                </li>
                <li class="nav-item">
                    <a class="features-button" href="/features">
                        <span class="features-icon">✨</span> Features
                    </a>
                </li>
            </ul>
            <ul class="navbar-nav" id="authLinks">
                <!-- Will be populated by JavaScript -->
            </ul>
        </div>
    </div>
</nav>

    
    <main class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-body">
                        <h3 class="card-title">Profile Settings</h3>
                        <form id="profileForm" class="mt-4">
                            <div class="mb-3">
                                <label for="email" class="form-label">Email address</label>
                                <input type="email" class="form-control" id="email" readonly>
                            </div>
                            <div class="mb-3">
                                <label for="whatsapp" class="form-label">WhatsApp Number</label>
                                <input type="tel" class="form-control" id="whatsapp">
                            </div>
                            <div class="mb-3">
                                <label for="maxAlerts" class="form-label">Maximum Daily Alerts</label>
                                <select class="form-select" id="maxAlerts">
                                    <option value="1">1 alert per day</option>
                                    <option value="5">5 alerts per day</option>
                                    <option value="10">10 alerts per day</option>
                                    <option value="15">15 alerts per day</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <button type="submit" class="btn btn-primary">Save Changes</button>
                            </div>
                        </form>

                        <hr class="my-4">

                        <h4>Change Password</h4>
                        <form id="passwordForm" class="mt-3">
                            <div class="mb-3">
                                <label for="currentPassword" class="form-label">Current Password</label>
                                <input type="password" class="form-control" id="currentPassword" required>
                            </div>
                            <div class="mb-3">
                                <label for="newPassword" class="form-label">New Password</label>
                                <input type="password" class="form-control" id="newPassword" required>
                            </div>
                            <div class="mb-3">
                                <label for="confirmPassword" class="form-label">Confirm New Password</label>
                                <input type="password" class="form-control" id="confirmPassword" required>
                            </div>
                            <button type="submit" class="btn btn-warning">Change Password</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- arsrates/app/templates/partials/scripts.html -->
<!-- Bootstrap Bundle JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- App Configuration and Authentication -->
<script src="/static/js/config.js"></script>
<script src="/static/js/auth.js"></script>

<!-- Add any other global utility functions after auth.js -->
<script>
// Add any global utility functions that aren't auth-related here
</script>
    
    <script>
        // Main initialization function
        async function initializePage() {
            try {
                // Check auth state
                const isAuthenticated = await AuthManager.checkAuth();
                console.log('Authentication check result:', isAuthenticated);
                
                if (!isAuthenticated) {
                    console.log('Redirecting to login...');
                    window.location.href = `${window.APP_CONFIG.API_URL}/login`;
                    return;
                }

                // Update UI
                AuthManager.updateUI();

                // Load profile data
                await loadProfile();
                
                // Initialize form handlers
                initializeFormHandlers();
                
            } catch (error) {
                console.error('Authentication check error:', error);
                window.location.href = `${window.APP_CONFIG.API_URL}/login`;
            }
        }

        // Profile loading function
        async function loadProfile() {
            try {
                const response = await AuthManager.fetchWithAuth(`${window.APP_CONFIG.API_URL}/auth/me`);
                
                if (!response || !response.ok) {
                    throw new Error('Failed to load profile');
                }

                const profileData = await response.json();
                console.log('Loaded profile data:', profileData);

                // Set form values
                document.getElementById('email').value = profileData.email || '';
                document.getElementById('whatsapp').value = profileData.whatsapp || '';
                document.getElementById('maxAlerts').value = profileData.max_alerts_per_day || 5;

            } catch (error) {
                console.error('Error loading profile:', error);
                window.location.href = `${window.APP_CONFIG.API_URL}/login`;
            }
        }

        // Form initialization
        function initializeFormHandlers() {
            // Password change form
            document.getElementById('passwordForm').addEventListener('submit', async (e) => {
                e.preventDefault();

                const currentPassword = document.getElementById('currentPassword').value;
                const newPassword = document.getElementById('newPassword').value;
                const confirmPassword = document.getElementById('confirmPassword').value;

                let statusMsg = document.getElementById('passwordStatusMessage');
                if (!statusMsg) {
                    statusMsg = document.createElement('div');
                    statusMsg.id = 'passwordStatusMessage';
                    document.getElementById('passwordForm').appendChild(statusMsg);
                }

                if (newPassword !== confirmPassword) {
                    statusMsg.className = 'alert alert-danger mt-3';
                    statusMsg.textContent = 'New passwords do not match';
                    statusMsg.style.display = 'block';
                    return;
                }

                try {
                    const response = await fetch(`${window.APP_CONFIG.API_URL}/auth/change-password`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${AuthManager.getToken()}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            current_password: currentPassword,
                            new_password: newPassword
                        })
                    });

                    const responseData = await response.json();

                    if (response.ok) {
                        statusMsg.className = 'alert alert-success mt-3';
                        statusMsg.textContent = 'Password updated successfully';
                        document.getElementById('passwordForm').reset();
                    } else {
                        statusMsg.className = 'alert alert-danger mt-3';
                        statusMsg.textContent = responseData.detail || 'Failed to update password';
                    }
                    statusMsg.style.display = 'block';
                } catch (error) {
                    console.error('Error:', error);
                    statusMsg.className = 'alert alert-danger mt-3';
                    statusMsg.textContent = 'Failed to update password';
                    statusMsg.style.display = 'block';
                }
            });

            // Profile update form
            document.getElementById('profileForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                try {
                    const formData = {
                        whatsapp: document.getElementById('whatsapp').value || null,
                        max_alerts_per_day: parseInt(document.getElementById('maxAlerts').value)
                    };
                    
                    const response = await AuthManager.fetchWithAuth(
                        `${window.APP_CONFIG.API_URL}/auth/profile`,
                        {
                            method: 'PUT',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(formData)
                        }
                    );

                    if (!response) return; // AuthManager will handle redirection if needed
                    
                    if (response.ok) {
                        alert('Profile updated successfully');
                        await loadProfile(); // Refresh profile data
                    } else {
                        const error = await response.json();
                        alert(error.detail || 'Failed to update profile');
                    }
                } catch (error) {
                    console.error('Error:', error);
                    alert('Failed to update profile');
                }
            });
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', initializePage);
    </script>
</body>
</html>
